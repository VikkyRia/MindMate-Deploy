<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindMate | Wellness for Freelancers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>MindMate 🌿</h1>
      <p class="tagline">Wellness for Founders, Entrepreneurs & Freelancers</p>
    </header>
    
    <div class="chat-box" id="chat-box">
     <div class="bot-msg">
  Welcome back! Building a business or freelancing can be tough - I'm here to help you navigate the stress. How are you feeling today?
</div>
    </div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type about your day, deadlines, or stress..." autofocus>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
