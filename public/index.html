<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindMate | Wellness for Freelancers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
   <header>
    <h1>MindMate 🌿</h1>
    <p class="tagline">Your Safe Space for Mental Clarity & Peace</p>
</header>

    <div class="chat-box" id="chat-box">
    <div class="bot-msg">
  Welcome to your safe space. Life can be heavy sometimes, and you don't have to carry it alone. This is a judgment-free zone where your heart can speak freely. How are you feeling today?
</div>
    </div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type about your day, deadlines, or stress..." autofocus>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
